    background: #ff2200;
    pointer-events: none;
    height: 100vh;
    width: 100vw;

    z-index: 1000;

    visibility: hidden;

<link href="/stellarium/css/app.3714d66a.css" rel="stylesheet">
<style type="text/css">
  /* Stock build uses #stel-canvas { z-index: -10 }. In our dashboard iframe the canvas paints
     behind #app / Vuetify and the sky stays black. Toolbar / search use z-index 1–2 so 0 stays under UI. */
  #stel-canvas { z-index: 0 !important; }
  .v-application--wrap { background: transparent !important; }
</style>
</head>
<body>
<div id="nightmode"></div>
<noscript><strong>We're sorry but stellarium-web doesn't work properly without JavaScript enabled. Please enable it to continue.</strong></noscript>
<div id="app"><router-view></router-view></div>
<script src="/stellarium/js/chunk-vendors.a9e667ff.js"></script>
<script src="/stellarium/js/app.44b5ed00.js"></script>
<script>
(function () {
  // Bridge the in-app Stellarium engine handle onto window so the parent frame
  // (Pomfret Atlas page) can drive it via same-origin access.
  function tryExpose() {
    var appEl = document.getElementById('app');
    if (!appEl) return false;
    var root = appEl.__vue__;
    if (!root || !root.$store) return false;
    var stel = root.$store.state.stel;
    if (!stel || !stel.core) return false;
    window.stel = stel;
    window.$stelRoot = root;
    try {
      window.parent && window.parent.postMessage({ source: 'pomfret-stellarium', type: 'ready' }, '*');
    } catch (_) {}
    return true;
  }
  var tries = 0;
  var timer = setInterval(function () {
    if (tryExpose() || ++tries > 120) clearInterval(timer);
  }, 400);
  function nudgeResize() {
    try {
      window.dispatchEvent(new Event('resize'));
    } catch (_) {}
  }
  window.addEventListener('load', function () {
    nudgeResize();
    setTimeout(nudgeResize, 100);
    setTimeout(nudgeResize, 500);
    setTimeout(nudgeResize, 1500);
  });
})();
</script>
</body>
</html>
